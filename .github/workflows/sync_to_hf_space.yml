name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  # Enable manual triggering from Actions tab
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so push works
          lfs: true # Only needed if you decide to push binary LFS files
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git rm -rf --cached ui/images/ || true
          git commit -m "Exclude images for HF push" || true
          git push --force https://bfavro73:$HF_TOKEN@huggingface.co/spaces/bfavro73/pydataco HEAD:main