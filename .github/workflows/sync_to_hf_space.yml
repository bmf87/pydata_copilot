name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  # Enable manual triggering from Actions tab
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so push works
          lfs: true # Only needed if you decide to push binary LFS files
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Create a new branch with no history
          git checkout --orphan hf_deploy
          
          # Remove the images from the staging area so they aren't included
          git rm -rf --cached ui/images/ || true
          
          # Commit the current state as a single fresh commit
          git commit -m "Sync to HF Spaces"
          
          # Force push this isolated commit to the main branch of HF Spaces
          git push --force https://bfavro73:$HF_TOKEN@huggingface.co/spaces/bfavro73/pydataco hf_deploy:main